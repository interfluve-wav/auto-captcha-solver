name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
      - name: Ruff lint
        run: ruff check src tests
      - name: mypy typecheck
        run: mypy src

  tests:
    name: Test (${{ matrix.python }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev,playwright]
          python -m playwright install --with-deps chromium
      - name: Run tests
        run: |
          pytest tests/ -v

  build:
    name: Build distributions
    runs-on: ubuntu-latest
    needs: [quality, tests]
    if: github.ref == 'refs/heads/main'
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      - name: Build wheels and source
        run: |
          python -m build --sdist --wheel --outdir dist/
      - name: Inspect wheel
        run: |
          ls -lh dist/
          twine check dist/*
      - name: Get version from package
        id: version
        run: |
          VERSION=$(python -c "import importlib.util; spec=importlib.util.spec_from_file_location('pkg','src/auto_captcha_solver/__init__.py'); mod=importlib.util.module_from_spec(spec); spec.loader.exec_module(mod); print(mod.__version__)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 30

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
